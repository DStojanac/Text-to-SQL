model_name: google/flan-t5-large

train_file: data/processed/spider_train.jsonl
dev_file: data/processed/spider_dev.jsonl

output_dir: outputs/checkpoints/flan_t5_large_full

max_input_length: 512
max_target_length: 256

# Full dataset
train_subset_size: null
dev_subset_size: 500

num_train_epochs: 6
learning_rate: 5e-5
weight_decay: 0.01

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16

# Gradient checkpointing trades speed for memory — instead of keeping
# all intermediate activations in VRAM, it recomputes them during the
# backward pass.
gradient_checkpointing: true

warmup_ratio: 0.1
logging_steps: 50
save_total_limit: 3

predict_with_generate: true
generation_max_length: 256

# fp16 works well on Colab GPUs
fp16: true
