model_name: google/flan-t5-small

train_file: data/processed/spider_train.jsonl
dev_file: data/processed/spider_dev.jsonl

output_dir: outputs/checkpoints/flan_t5_small_medium

max_input_length: 512
max_target_length: 128

train_subset_size: 3000
dev_subset_size: 300

num_train_epochs: 3
learning_rate: 5e-4
weight_decay: 0.01

per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4

warmup_ratio: 0.05
logging_steps: 20
save_total_limit: 2

predict_with_generate: true
generation_max_length: 128

fp16: false
